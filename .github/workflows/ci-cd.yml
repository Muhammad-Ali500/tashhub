name: taskhub

on: 
  push:
    branches: [main,master]
  pull_request:
    branches: [main,master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10","3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
           
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
           
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: run application
        run: |
          python app.py &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:5000/ 
          kill $SERVER_PID

deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── STEP: Log in to Docker Hub ──────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── STEP: Build Docker image ────────────────────────────────────────
      - name: Build Docker image
        run: docker build -t tashhub .

      # ── STEP: Tag and push to Docker Hub ────────────────────────────────
      - name: Tag and push to Docker Hub
        run: |
          IMAGE=$(echo "${{ secrets.DOCKER_USERNAME }}" | xargs)/tashhub
          docker tag tashhub $IMAGE:latest
          docker tag tashhub $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
